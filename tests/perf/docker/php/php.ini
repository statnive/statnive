; PHP configuration for performance testing.
; Optimized for stable, reproducible benchmark results.

; OPcache: on, aggressive caching
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.interned_strings_buffer = 16
; revalidate_freq=0: check file timestamps every request.
; Safe for testing (code changes take effect immediately).
; Production would use revalidate_freq=60.
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Memory / execution limits (generous for WooCommerce)
memory_limit = 256M
max_execution_time = 120
max_input_vars = 5000

; Upload limits (for WooCommerce sample data import)
upload_max_filesize = 64M
post_max_size = 64M

; Error logging (stderr so it shows in docker logs)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE
log_errors = On
display_errors = Off
error_log = /proc/self/fd/2

; Disable Xdebug / profiling (must not be active during benchmarks)
; xdebug.mode = off
