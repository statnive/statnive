; PHP-FPM pool configuration for performance testing.
;
; Uses STATIC pool (no dynamic fork/kill) to eliminate process-management
; noise from benchmark measurements. 4 workers handles light tier
; comfortably. Increase to 8-16 for medium/heavy tiers.
;
; Overrides the default www.conf from the WordPress FPM image.

[www]
user = www-data
group = www-data

listen = 9000

pm = static
pm.max_children = 4

; Status and ping endpoints for healthchecks
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Slow log for debugging (Phase 5 outlier investigation)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Terminate requests that hang for > 120s
request_terminate_timeout = 120s

; Clear env to prevent leaking host vars into PHP
clear_env = no
