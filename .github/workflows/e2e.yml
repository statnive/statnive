name: E2E

on:
  pull_request:
    branches: [main, master, development]

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright against wp-env
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      WP_BASE_URL: http://localhost:8889
      WP_REST_URL: http://localhost:8889/wp-json
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: password
      WP_TABLE_PREFIX: wp_
      WP_ROOT: ${{ github.workspace }}/wp-env-files/wordpress
      STATNIVE_E2E_DEBUG: '1'
      STATNIVE_E2E_IP_FILTER: '1'
      STATNIVE_E2E_CONSENT_STUB: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2575231 # v2.31.1
        with:
          php-version: '8.2'
          tools: composer:v2, wp-cli
          coverage: none

      - name: Install node deps
        run: npm ci

      - name: Install composer deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npx -y @wordpress/env@10.0.0 start --update

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
